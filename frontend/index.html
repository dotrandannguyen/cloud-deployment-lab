<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>HELLO TEST DEPLOYYYYY</title>
</head>
<body>
  <h1>Frontend trên S3</h1>

  <p>
    Backend health:
    <span id="status">checking...</span>
  </p>

  <script>
    // Gọi trực tiếp qua relative path. 
    // Khi chạy trên CloudFront, nó sẽ tự động nối vào domain hiện tại, ví dụ: dxxxx.cloudfront.net/api/health
    fetch('/api/health')
      .then((r) => {
        if (!r.ok) {
          throw new Error(`HTTP error! status: ${r.status}`);
        }
        return r.json();
      })
      .then((d) => {
        document.getElementById("status").textContent =
          JSON.stringify(d);
      })
      .catch((e) => {
        document.getElementById("status").textContent =
          "error: " + e.message;
      });
  </script>
</body>
</html>
